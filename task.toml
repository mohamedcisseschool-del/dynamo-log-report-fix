artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires exact parsing of client IPs and quoted HTTP request paths, followed by generation of a JSON file with a strict schema."
solution_explanation = "Read each non-empty log line, count the requests and distinct first-field client IPs, count the request paths, and write the most frequent path with the two counts to /app/report.json."
verification_explanation = "Load /app/report.json, require the exact three-key JSON schema and value types, and compare total_requests, unique_ips, and top_path with the correct results for the bundled access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
