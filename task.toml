artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task is small, but the parser has to pull the client IP and request path from each log line and return the exact JSON shape."
solution_explanation = "Read each nonblank line, collect unique client IPs, count paths from the quoted request, then write the totals and most common path to /app/report.json."
verification_explanation = "The tests load /app/report.json, check the exact keys and types, and verify the three values against the bundled six-line log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
